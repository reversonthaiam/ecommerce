default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: ecommerce_development
  host: localhost
  username: dev
  password: dev

test:
  <<: *default
  database: ecommerce_test
  host: localhost
  username: dev
  password: dev

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>